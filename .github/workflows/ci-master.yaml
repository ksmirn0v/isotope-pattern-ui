name: ci-master
env:
  NODE_VERSION: "20"
on:
  push:
    branches:
      - master
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: install node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: install dependencies
        run: npm ci
      - name: lint
        run: npm run lint
      - name: build
        env:
          VITE_API_BASE_URL: ${{ secrets.PROD_API_BASE_URL }}
        run: npm run build
      - name: test
        run: npm test -- --run
      - name: saving build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-prod
          path: ./dist
  tag-release:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: find merged PR title
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" --jq '.[0].title // empty')
          if [ -z "$title" ]; then
            echo "No pull request associated with this push; skipping release tagging" >&2
            exit 1
          fi
          echo "title=${title}" | tee -a "$GITHUB_OUTPUT"
      - name: compute next version
        id: version
        env:
          PR_TITLE: ${{ steps.pr.outputs.title }}
        run: |
          version=$(.github/scripts/compute-next-version.sh "$PR_TITLE")
          echo "version=${version}" | tee -a "$GITHUB_OUTPUT"
      - name: create and push release tag
        id: tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${VERSION}" -m "Release ${VERSION}"
          git push origin "${VERSION}"
          echo "version=${VERSION}" | tee -a "$GITHUB_OUTPUT"
  deploy-prod:
    needs: tag-release
    runs-on: ubuntu-latest
    steps:
      - name: loading build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-prod
          path: ./dist
      - name: deploy to Netlify prod site
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_PROD_SITE_ID }}
        run: npx --yes netlify-cli@17 deploy --dir=dist --prod
